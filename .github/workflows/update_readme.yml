name: Generate and Commit Dynamic README

on:
  schedule:
    - cron: '30 21 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch README from server
        env:
          MY_SECRET: ${{ secrets.README_API_SECRET }}
        run: |
          curl -H "token: $MY_SECRET" \
            https://tymczasowymail.pl/zmiana > README.md


      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update readme via AI" && git push)